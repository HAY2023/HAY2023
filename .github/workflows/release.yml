name: Unified Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.job_id }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - job_id: desktop-windows
            platform: windows
            os: windows-latest
            artifact_name: windows-bundle
          - job_id: android-apk
            platform: android
            os: ubuntu-22.04
            artifact_name: android-apk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust toolchain (Windows)
        if: ${{ matrix.platform == 'windows' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup MSVC developer command prompt (Windows)
        if: ${{ matrix.platform == 'windows' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build Tauri app (Windows)
        if: ${{ matrix.platform == 'windows' }}
        run: npm run tauri:build

      - name: Decode PFX certificate from secret (Windows)
        if: ${{ matrix.platform == 'windows' && secrets.WINDOWS_PFX != '' && secrets.WINDOWS_PFX_PASSWORD != '' }}
        shell: pwsh
        env:
          WINDOWS_PFX: ${{ secrets.WINDOWS_PFX }}
        run: |
          $pfxBytes = [Convert]::FromBase64String($env:WINDOWS_PFX)
          [IO.File]::WriteAllBytes('certificate.pfx', $pfxBytes)

      - name: Sign Windows installers (if certificate provided)
        if: ${{ matrix.platform == 'windows' && secrets.WINDOWS_PFX != '' && secrets.WINDOWS_PFX_PASSWORD != '' }}
        shell: pwsh
        env:
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          $signtool = 'C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe'
          if (-Not (Test-Path $signtool)) { $signtool = 'signtool' }

          $installers = Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -Include *.exe,*.msi,*.msix | ForEach-Object { $_.FullName }
          if ($installers.Count -eq 0) { Write-Host 'No installers found to sign.'; exit 0 }

          foreach ($file in $installers) {
            Write-Host "Signing $file"
            & $signtool sign /f certificate.pfx /p $env:WINDOWS_PFX_PASSWORD /tr http://timestamp.digicert.com /td SHA256 /fd SHA256 "$file"
          }

      - name: Setup Java 17 (Android)
        if: ${{ matrix.platform == 'android' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK (Android)
        if: ${{ matrix.platform == 'android' }}
        uses: android-actions/setup-android@v3

      - name: Setup Rust toolchain (Android)
        if: ${{ matrix.platform == 'android' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Validate Android signing secrets
        if: ${{ matrix.platform == 'android' }}
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for key in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Decode Android keystore from secret
        if: ${{ matrix.platform == 'android' }}
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_PATH="${RUNNER_TEMP}/release.keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          echo "TAURI_ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Initialize Android project (if missing)
        if: ${{ matrix.platform == 'android' }}
        shell: bash
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            npx tauri android init
          else
            echo "Android project already initialized."
          fi

      - name: Build signed release APK
        if: ${{ matrix.platform == 'android' }}
        shell: bash
        env:
          TAURI_ANDROID_KEYSTORE_PATH: ${{ env.TAURI_ANDROID_KEYSTORE_PATH }}
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: npm run tauri android build -- --apk

      - name: Verify APK signature (if apksigner is available)
        if: ${{ matrix.platform == 'android' }}
        shell: bash
        run: |
          APK_PATH="$(find src-tauri/gen/android/app/build/outputs -type f -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "::error::No APK file found for signature verification."
            exit 1
          fi

          APKSIGNER="$(find "${ANDROID_HOME}/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          if [ -z "$APKSIGNER" ]; then
            echo "apksigner not found in Android SDK build-tools; skipping signature verification."
            exit 0
          fi

          "$APKSIGNER" verify --verbose "$APK_PATH"

      - name: Upload Windows bundle artifact
        if: ${{ matrix.platform == 'windows' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/release/bundle/**

      - name: Upload Android APK artifact
        if: ${{ matrix.platform == 'android' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/gen/android/app/build/outputs/**/*.apk

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-bundle
          path: release-assets/windows

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-assets/android

      - name: Show collected assets
        shell: bash
        run: |
          echo "Windows assets:"
          find release-assets/windows -type f || true
          echo "Android assets:"
          find release-assets/android -type f || true

      - name: Create/Update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            release-assets/windows/**/*.exe
            release-assets/android/**/*.apk
