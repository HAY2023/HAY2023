name: Tauri CI Build (Legacy Manual)

# Legacy manual backup workflow.
# Primary release flow now lives in `.github/workflows/release.yml`.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows bundle (manual)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build Tauri (Windows)
        run: npm run tauri:build

      - name: Decode PFX certificate from secret
        if: ${{ secrets.WINDOWS_PFX != '' && secrets.WINDOWS_PFX_PASSWORD != '' }}
        shell: pwsh
        env:
          WINDOWS_PFX: ${{ secrets.WINDOWS_PFX }}
        run: |
          $pfxBytes = [Convert]::FromBase64String($env:WINDOWS_PFX)
          [IO.File]::WriteAllBytes('certificate.pfx', $pfxBytes)

      - name: Sign Windows installers (if certificate provided)
        if: ${{ secrets.WINDOWS_PFX != '' && secrets.WINDOWS_PFX_PASSWORD != '' }}
        shell: pwsh
        env:
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          $signtool = 'C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe'
          if (-Not (Test-Path $signtool)) { $signtool = 'signtool' }
          $installers = Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -Include *.exe,*.msi,*.msix | ForEach-Object { $_.FullName }
          if ($installers.Count -eq 0) { Write-Host 'No installers found to sign.'; exit 0 }
          foreach ($file in $installers) {
            Write-Host "Signing $file"
            & $signtool sign /f certificate.pfx /p $env:WINDOWS_PFX_PASSWORD /tr http://timestamp.digicert.com /td SHA256 /fd SHA256 "$file"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows-manual
          path: src-tauri/target/release/bundle/**
